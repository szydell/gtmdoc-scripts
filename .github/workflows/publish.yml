name: Publish Site

on:
  workflow_dispatch: # Ręczne odpalanie
  workflow_run:
    workflows: ["Daily Mirror"]
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'migrate.py'
      - 'site/**'
      - '.github/workflows/publish.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Przy workflow_run: tylko jeśli mirror zakończył się sukcesem
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Setup OS utilities (rsync, git)
        run: sudo apt-get update && sudo apt-get install -y rsync git

      - name: Checkout gtmdoc-scripts
        uses: actions/checkout@v7
        with:
          path: gtmdoc-scripts

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache uv downloads
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-gh-${{ runner.os }}-${{ hashFiles('gtmdoc-scripts/pyproject.toml') }}
          restore-keys: |
            uv-gh-${{ runner.os }}-

      - name: Restore Mirror Cache
        id: mirror-cache
        uses: actions/cache/restore@v6
        with:
          path: gtmdoc-scripts/.work/mirror
          key: gtm-mirror-publish-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            gtm-mirror-${{ runner.os }}-

      - name: Populate mirror from gtmdoc repo (cache miss fallback)
        if: steps.mirror-cache.outputs.cache-hit != 'true'
        env:
          GTMDOC_PAT: ${{ secrets.GTMDOC_PAT }}
        run: |
          set -euo pipefail
          MIRROR_DIR="gtmdoc-scripts/.work/mirror"
          if [[ -d "$MIRROR_DIR" ]]; then
            HTML_COUNT=$(find "$MIRROR_DIR" -name '*.html' | wc -l)
          else
            HTML_COUNT=0
          fi
          if [[ "$HTML_COUNT" -lt 10 ]]; then
            echo "Cache miss or stale (${HTML_COUNT} HTML files) — cloning gtmdoc repo"
            git clone --depth=1 \
              "https://x-access-token:${GTMDOC_PAT}@github.com/szydell/gtmdoc.git" \
              _gtmdoc_tmp
            mkdir -p "$MIRROR_DIR"
            rsync -a --exclude='.git/' --exclude='README.md' _gtmdoc_tmp/ "$MIRROR_DIR/"
            rm -rf _gtmdoc_tmp
            echo "Populated mirror: $(find "$MIRROR_DIR" -name '*.html' | wc -l) HTML files"
          else
            echo "Cache hit with ${HTML_COUNT} HTML files — skipping gtmdoc clone"
          fi

      - name: Setup Git identity
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/gtmdoc-scripts"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/gtmdoc-mumps.pl"

      - name: Checkout gtmdoc-mumps.pl site repo
        env:
          GTMDOC_PAT: ${{ secrets.GTMDOC_PAT }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GTMDOC_PAT}@github.com/szydell/gtmdoc-mumps.pl.git"
          if git clone --depth=1 "$REPO_URL" gtmdoc-mumps.pl 2>/dev/null; then
            echo "Cloned gtmdoc-mumps.pl"
          else
            mkdir -p gtmdoc-mumps.pl
            cd gtmdoc-mumps.pl
            git init
            git remote add origin "$REPO_URL"
          fi

      - name: Run migrate.py
        run: |
          set -euo pipefail
          cd gtmdoc-scripts
          uv run python migrate.py

      - name: Setup Go (required by Hugo modules / Hextra theme)
        uses: actions/setup-go@v6
        with:
          go-version-file: gtmdoc-scripts/site/go.mod
          cache-dependency-path: gtmdoc-scripts/site/go.sum

      - name: Install Hugo Extended
        run: |
          set -euo pipefail
          HUGO_VERSION=0.152.2
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"

      - name: Build Hugo site for S3/mumps.pl
        run: |
          set -euo pipefail
          cd gtmdoc-scripts/site
          hugo --minify --gc --baseURL https://mumps.pl/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        id: s3sync
        run: |
          set -euo pipefail
          SYNC_OUTPUT=$(aws s3 sync gtmdoc-scripts/site/public/ "s3://${{ vars.AWS_S3_BUCKET }}/" \
            --delete \
            --region "${{ vars.AWS_REGION }}")
          echo "$SYNC_OUTPUT"
          if [ -n "$SYNC_OUTPUT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — skipping CloudFront invalidation."
          fi

      - name: Invalidate CloudFront cache
        if: steps.s3sync.outputs.changed == 'true'
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.AWS_CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Sync static site to gtmdoc-mumps.pl
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git/' \
            gtmdoc-scripts/site/public/ \
            gtmdoc-mumps.pl/

      - name: Commit and push gtmdoc-mumps.pl
        env:
          GTMDOC_PAT: ${{ secrets.GTMDOC_PAT }}
        run: |
          set -euo pipefail
          cd gtmdoc-mumps.pl
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Publish Hugo site (${TIMESTAMP})"
            git push --force origin HEAD:main
          fi
