name: Daily Mirror

on:
  schedule:
    - cron: '0 4 * * *' # Codziennie o 4:00 UTC
  workflow_dispatch: # Możliwość ręcznego odpalania
  push:
    branches:
      - main
    paths:
      - 'sync_mirror.py'
      - '.github/workflows/mirror.yml'

permissions:
  contents: write # Umożliwia aktualizowanie docelowych repozytoriów

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OS utilities (wget, rsync, git, poppler-utils)
        run: sudo apt-get update && sudo apt-get install -y wget rsync git tar poppler-utils

      - name: Checkout gtmdoc-scripts
        uses: actions/checkout@v6
        with:
          path: gtmdoc-scripts

      - name: Checkout or init gtmdoc target repo
        env:
          GTMDOC_PAT: ${{ secrets.GTMDOC_PAT }}
        run: |
          REPO_URL="https://x-access-token:${GTMDOC_PAT}@github.com/szydell/gtmdoc.git"
          if git clone --depth=1 "$REPO_URL" gtmdoc 2>/dev/null; then
            echo "Cloned existing repo"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Restore Mirror Cache (Delta Updates)
        uses: actions/cache@v5
        with:
          path: gtmdoc-scripts/.work/mirror
          key: gtm-mirror-${{ github.run_id }}
          restore-keys: |
            gtm-mirror-

      - name: Setup Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /__w/gtmdoc-scripts/gtmdoc-scripts/gtmdoc-scripts
          git config --global --add safe.directory /__w/gtmdoc-scripts/gtmdoc-scripts/gtmdoc

      - name: Run Mirror Sync
        run: |
          cd gtmdoc-scripts
          uv add playwright
          uv run playwright install --with-deps chromium
          uv run python sync_mirror.py \
            --target-repo ../gtmdoc \
            --target-domain mumps.pl \
            --commit \
            --push
