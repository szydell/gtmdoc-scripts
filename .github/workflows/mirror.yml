name: Daily Mirror

on:
  schedule:
    - cron: '0 4 * * *' # Codziennie o 4:00 UTC
  workflow_dispatch: # Możliwość ręcznego odpalania
  push:
    branches:
      - main
    paths:
      - 'sync_mirror.py'
      - '.github/workflows/mirror.yml'

permissions:
  contents: write # Umożliwia aktualizowanie docelowych repozytoriów

jobs:
  mirror:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60
    steps:
      - name: Verify runner prerequisites
        run: |
          set -euo pipefail
          for cmd in wget rsync git tar; do
            command -v "$cmd" >/dev/null || {
              echo "::error::Missing required tool on self-hosted runner: $cmd"
              exit 1
            }
          done
          if ! command -v pdftotext >/dev/null; then
            echo "::warning::pdftotext missing; README revision metadata from PDFs will be skipped"
          fi

      - name: Checkout gtmdoc-scripts
        uses: actions/checkout@v7
        with:
          path: gtmdoc-scripts
          clean: false

      - name: Checkout or init gtmdoc target repo
        env:
          GTMDOC_PAT: ${{ secrets.GTMDOC_PAT }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GTMDOC_PAT}@github.com/szydell/gtmdoc.git"
          if [[ -d gtmdoc/.git ]]; then
            echo "Reusing existing gtmdoc checkout"
            git -C gtmdoc remote set-url origin "$REPO_URL"
            git -C gtmdoc fetch --depth=1 origin main
            git -C gtmdoc checkout -B main origin/main
            git -C gtmdoc clean -fdx
          elif [[ -e gtmdoc ]]; then
            echo "::error::Path gtmdoc exists but is not a git repository"
            exit 1
          elif git clone --depth=1 "$REPO_URL" gtmdoc; then
            echo "Cloned existing repo"
          else
            echo "::error::Failed to clone gtmdoc target repository"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache uv downloads
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('gtmdoc-scripts/pyproject.toml') }}

      - name: Prepare local mirror cache directory
        run: |
          set -euo pipefail
          mkdir -p gtmdoc-scripts/.work/mirror

      - name: Diagnose mirror cache state
        run: |
          set -euo pipefail
          CACHE_DIR="gtmdoc-scripts/.work/mirror"
          echo "Cache dir: $CACHE_DIR"
          du -sh "$CACHE_DIR" || true
          echo "Total files: $(find "$CACHE_DIR" -type f | wc -l)"
          echo "HTML files: $(find "$CACHE_DIR" -type f -name '*.html' | wc -l)"
          if [[ -f "gtmdoc-scripts/.work/mirror_fetch_report.json" ]]; then
            echo "Previous fetch report found:"
            tail -n 40 gtmdoc-scripts/.work/mirror_fetch_report.json || true
          else
            echo "No previous fetch report found."
          fi

      - name: Setup Git identity
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/gtmdoc-scripts"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/gtmdoc"

      - name: Run Mirror Sync
        run: |
          set -euo pipefail
          cd gtmdoc-scripts
          uv run python sync_mirror.py \
            --target-repo ../gtmdoc \
            --target-domain mumps.pl \
            --commit \
            --push
